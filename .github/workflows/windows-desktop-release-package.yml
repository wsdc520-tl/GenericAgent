name: Build Windows Desktop Portable Package

"on":
  push:
    branches:
      - test
      - test_yiqi
    paths:
      - ".github/workflows/windows-desktop-release-package.yml"
      - "desktop_release/scripts/windows/install_windows.ps1"
      - "frontends/desktop/**"
      - "frontends/conductor.py"
  workflow_dispatch:
    inputs:
      upload_release:
        description: "Also create/update a GitHub pre-release"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      release_tag:
        description: "Release tag when upload_release=true, e.g. desktop-windows-portable-123"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows portable package
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontends/desktop/src-tauri -> target

      - name: Install desktop dependencies
        working-directory: frontends/desktop
        run: npm install

      - name: Build Windows desktop exe
        working-directory: frontends/desktop
        run: npm run tauri build -- --bundles nsis

      - name: Assemble self-contained portable bundle
        shell: bash
        run: |
          set -euo pipefail

          EXE_SRC="$(find frontends/desktop/src-tauri/target/release -maxdepth 1 -type f -name 'ga-desktop.exe' | head -n 1)"
          [[ -n "$EXE_SRC" ]] || { echo "ga-desktop.exe not found" >&2; exit 1; }

          PKG="artifacts/windows/GenericAgent-Desktop-Portable"
          RUNTIME="$PKG/runtime"
          mkdir -p "$RUNTIME"

          # exe at the top level (typical portable form)
          cp "$EXE_SRC" "$PKG/GenericAgent-Desktop-Windows.exe"
          cp desktop_release/scripts/windows/install_windows.ps1 "$RUNTIME/install_windows.ps1"

          # Embedded Python (python-build-standalone, windows x86_64, 3.12).
          # browser_download_url is URL-encoded ('+' -> '%2B'); match loosely with '.*'.
          # 'install_only\.tar\.gz' (literal) excludes the '..._stripped.tar.gz' variant.
          PBS_URL="$(curl -fsSL https://api.github.com/repos/astral-sh/python-build-standalone/releases/latest \
            | grep -o '"browser_download_url": *"[^"]*"' \
            | grep 'cpython-3\.12\.[0-9].*x86_64-pc-windows-msvc-install_only\.tar\.gz' \
            | head -1 | sed -E 's/.*"(https[^"]+)"/\1/')"
          [[ -n "$PBS_URL" ]] || { echo "Could not resolve python-build-standalone download URL" >&2; exit 1; }
          echo "Python build-standalone: $PBS_URL"
          curl -fsSL -o /tmp/pbs.tar.gz "$PBS_URL"
          tar -xzf /tmp/pbs.tar.gz -C "$RUNTIME"   # extracts a 'python/' dir (python.exe at top)
          PY="$RUNTIME/python/python.exe"
          "$PY" --version

          # Offline wheels (native win_amd64 wheels for the embedded python)
          mkdir -p "$RUNTIME/wheels"
          "$PY" -m pip download --dest "$RUNTIME/wheels" \
            "requests>=2.28" "beautifulsoup4>=4.12" "bottle>=0.12" "simple-websocket-server>=0.4" "aiohttp>=3.9" psutil \
            fastapi uvicorn websockets pydantic setuptools wheel

          # Runtime source (project root minus heavy/dev/build dirs)
          mkdir -p "$RUNTIME/app"
          tar \
            --exclude='./.git' --exclude='./.github' \
            --exclude='./frontends/desktop/src-tauri' \
            --exclude='./frontends/desktop/node_modules' \
            --exclude='./desktop_release' --exclude='./docs' \
            --exclude='./assets/demo' --exclude='./assets/images' \
            --exclude='./assets/GenericAgent_Technical_Report.pdf' \
            --exclude='./artifacts' \
            --exclude='*/node_modules' --exclude='*/target' \
            --exclude='*/.venv' --exclude='./.venv' \
            --exclude='*/__pycache__' --exclude='*.pyc' \
            -cf - . | tar -xf - -C "$RUNTIME/app"
          test -f "$RUNTIME/app/agentmain.py"
          test -f "$RUNTIME/app/frontends/desktop_bridge.py"
          test -f "$RUNTIME/app/frontends/desktop/static/index.html"

          # Drop python debug symbols (.pdb) to slim the package (~80MB)
          find "$RUNTIME/python" -name '*.pdb' -delete 2>/dev/null || true

          cat > "$PKG/README_PORTABLE.md" <<'EOF'
          # GenericAgent Desktop — Windows 便携版（自包含）

          无需安装 Python、无需联网装依赖、无需源码仓库——全部已内置。

          ## 前置条件
          - Windows 10/11 x64
          - Microsoft Edge WebView2 运行时（Win11 一般自带；缺失时首次运行会有提示）

          ## 使用
          1. 解压到任意目录（路径建议不含特殊字符）。
          2. 双击 `GenericAgent-Desktop-Windows.exe`。
          3. 首次启动会自动离线准备环境（建虚拟环境、装依赖），界面显示进度，完成后进入主界面。
          4. 之后启动直接秒进。

          > 想真正对话，仍需在程序里配置模型 / API Key。

          ## 功能
          - 核心聊天（内置 bridge，端口 14168）。
          - 指挥家 / 协作（conductor，端口 8900）：随程序自动启动，已内置 fastapi/uvicorn 等依赖。

          ## 说明
          - 首次准备完成后不要移动本文件夹；若已移动，删除 `runtime\app\.venv` 后重新启动即可重建。
          - `runtime\` 是内置运行环境与源码，正常使用无需改动。

          ## 目录结构
          ```text
          GenericAgent-Desktop-Portable\
          ├── GenericAgent-Desktop-Windows.exe   ← 双击这个
          ├── README_PORTABLE.md
          └── runtime\
              ├── python\   wheels\   install_windows.ps1
              └── app\      运行所需源码（含 conductor）
          ```
          EOF
          sed -i 's/^          //' "$PKG/README_PORTABLE.md"

          echo "Package tree (top levels):"
          find "$PKG" -maxdepth 2 -printf '%y %p\n' | sort | head -40

      - name: Zip portable package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/windows/out | Out-Null
          Compress-Archive -Path artifacts/windows/GenericAgent-Desktop-Portable `
            -DestinationPath artifacts/windows/out/GenericAgent-Desktop-Portable.zip -Force
          $h = Get-FileHash artifacts/windows/out/GenericAgent-Desktop-Portable.zip -Algorithm SHA256
          "{0}  GenericAgent-Desktop-Portable.zip" -f $h.Hash.ToLowerInvariant() |
            Set-Content -Encoding ASCII artifacts/windows/out/SHA256SUMS.txt
          Get-ChildItem artifacts/windows/out | Format-Table Name, Length

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: GenericAgent-Desktop-Windows-Portable-${{ github.run_number }}
          path: |
            artifacts/windows/out/GenericAgent-Desktop-Portable.zip
            artifacts/windows/out/SHA256SUMS.txt
          if-no-files-found: error

      - name: Create or update Windows portable pre-release
        if: ${{ inputs.upload_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="$INPUT_TAG"
          if [[ -z "$TAG_NAME" ]]; then
            TAG_NAME="desktop-windows-portable-${{ github.run_number }}-${{ github.run_attempt }}"
          fi
          TITLE="GenericAgent Desktop Windows Portable ${{ github.run_number }}"
          NOTES="Windows self-contained portable bundle. Download GenericAgent-Desktop-Portable.zip, extract anywhere, and double-click GenericAgent-Desktop-Windows.exe (first launch prepares the bundled Python env offline)."

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" artifacts/windows/out/* --clobber
          else
            gh release create "$TAG_NAME" artifacts/windows/out/* \
              --target "${{ github.sha }}" \
              --title "$TITLE" \
              --notes "$NOTES" \
              --prerelease
          fi
