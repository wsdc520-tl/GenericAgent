name: Build Linux Desktop Release Package

"on":
  push:
    branches:
      - test
      - test_yiqi
    paths:
      - ".github/workflows/linux-desktop-release-package.yml"
      - "desktop_release/scripts/linux/install_linux.sh"
      - "frontends/desktop/**"
      - "frontends/conductor.py"
  workflow_dispatch:
    inputs:
      upload_release:
        description: "Also create/update a GitHub pre-release"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      release_tag:
        description: "Release tag when upload_release=true, e.g. desktop-linux-test-123"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux AppImage package
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontends/desktop/src-tauri -> target

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install desktop dependencies
        working-directory: frontends/desktop
        run: npm install

      - name: Build Linux AppImage
        working-directory: frontends/desktop
        run: npm run tauri build -- --bundles appimage

      - name: Collect Linux release package
        shell: bash
        run: |
          set -euo pipefail
          APPIMAGE_SRC="$(find frontends/desktop/src-tauri/target/release/bundle/appimage -maxdepth 1 -type f -name '*.AppImage' | head -n 1)"
          if [[ -z "$APPIMAGE_SRC" ]]; then
            echo "No AppImage found" >&2
            exit 1
          fi

          PKG_ROOT="artifacts/linux/GenericAgent-Desktop-Linux"
          mkdir -p "$PKG_ROOT"

          # Keep a stable internal file name so generated .desktop Exec= never changes on version upgrades.
          cp "$APPIMAGE_SRC" "$PKG_ROOT/GenericAgent.AppImage"
          chmod +x "$PKG_ROOT/GenericAgent.AppImage"

          # ---- Self-contained portable runtime: embedded python + offline wheels + source ----
          RUNTIME="$PKG_ROOT/runtime"
          mkdir -p "$RUNTIME"
          cp desktop_release/scripts/linux/install_linux.sh "$RUNTIME/install_linux.sh"
          chmod +x "$RUNTIME/install_linux.sh"

          # Embedded Python (python-build-standalone, linux x86_64, 3.12)
          # NOTE: the browser_download_url is URL-encoded ('+' -> '%2B'), so match loosely with '.*'.
          # 'install_only\.tar\.gz' (literal) excludes the '..._stripped.tar.gz' variant.
          PBS_URL="$(curl -fsSL https://api.github.com/repos/astral-sh/python-build-standalone/releases/latest \
            | grep -o '"browser_download_url": *"[^"]*"' \
            | grep 'cpython-3\.12\.[0-9].*x86_64-unknown-linux-gnu-install_only\.tar\.gz' \
            | head -1 | sed -E 's/.*"(https[^"]+)"/\1/')"
          [[ -n "$PBS_URL" ]] || { echo "Could not resolve python-build-standalone download URL" >&2; exit 1; }
          echo "Python build-standalone: $PBS_URL"
          curl -fsSL -o /tmp/pbs.tar.gz "$PBS_URL"
          tar -xzf /tmp/pbs.tar.gz -C "$RUNTIME"   # extracts a 'python/' dir
          PY="$RUNTIME/python/bin/python3"
          "$PY" --version

          # Offline wheels (native linux wheels for the embedded python)
          mkdir -p "$RUNTIME/wheels"
          "$PY" -m pip download --dest "$RUNTIME/wheels" \
            "requests>=2.28" "beautifulsoup4>=4.12" "bottle>=0.12" "simple-websocket-server>=0.4" "aiohttp>=3.9" psutil \
            fastapi uvicorn websockets pydantic setuptools wheel

          # Runtime source (project root minus heavy/dev/build dirs)
          mkdir -p "$RUNTIME/app"
          tar \
            --exclude='./.git' --exclude='./.github' \
            --exclude='./frontends/desktop/src-tauri' \
            --exclude='./frontends/desktop/node_modules' \
            --exclude='./desktop_release' --exclude='./docs' \
            --exclude='./assets/demo' --exclude='./assets/images' \
            --exclude='./assets/GenericAgent_Technical_Report.pdf' \
            --exclude='./artifacts' \
            --exclude='*/node_modules' --exclude='*/target' \
            --exclude='*/.venv' --exclude='./.venv' \
            --exclude='*/__pycache__' --exclude='*.pyc' \
            -cf - . | tar -xf - -C "$RUNTIME/app"
          test -f "$RUNTIME/app/agentmain.py"
          test -f "$RUNTIME/app/frontends/desktop_bridge.py"
          test -f "$RUNTIME/app/frontends/desktop/static/index.html"

          # Drop python debug/cache bits to slim the package
          find "$RUNTIME/python" -name '__pycache__' -type d -prune -exec rm -rf {} + 2>/dev/null || true

          cat > "$PKG_ROOT/README_LINUX.md" <<'EOF'
          # GenericAgent Desktop — Linux 便携版（自包含）

          无需安装 Python、无需联网装依赖、无需源码仓库——全部已内置。

          ## 前置条件
          - Linux x86_64（glibc，常见发行版即可）
          - 桌面环境 + FUSE（运行 AppImage 所需；多数发行版自带）

          ## 使用
          1. 解压本压缩包到任意目录（路径建议不含特殊字符）。
          2. 给 AppImage 执行权限并运行：
          ```bash
          chmod +x GenericAgent.AppImage
          ./GenericAgent.AppImage
          ```
          3. 首次启动会自动离线准备环境（建虚拟环境、装依赖），界面显示进度，完成后进入主界面。
          4. 之后启动直接秒进。

          > 想真正对话，仍需在程序里配置模型 / API Key。

          ## 功能
          - 核心聊天（内置 bridge，端口 14168）。
          - 指挥家 / 协作（conductor，端口 8900）：随程序自动启动，已内置 fastapi/uvicorn 等依赖。

          ## 说明
          - 首次准备完成后不要移动本文件夹；若已移动，删除 `runtime/app/.venv` 后重新启动即可重建。
          - `runtime/` 是内置运行环境与源码，正常使用无需改动。

          ## 目录结构
          ```text
          GenericAgent-Desktop-Linux/
          ├── GenericAgent.AppImage   ← 运行这个
          ├── README_LINUX.md
          └── runtime/
              ├── python/   wheels/   install_linux.sh
              └── app/      运行所需源码（含 conductor）
          ```
          EOF
          # Remove indentation added by YAML heredoc context if any shell preserves it.
          sed -i 's/^          //' "$PKG_ROOT/README_LINUX.md"

          (
            cd "$PKG_ROOT"
            sha256sum GenericAgent.AppImage README_LINUX.md > SHA256SUMS.txt
          )

          mkdir -p artifacts/linux/out
          tar -C artifacts/linux -czf artifacts/linux/out/GenericAgent-Desktop-Linux.tar.gz GenericAgent-Desktop-Linux
          (
            cd artifacts/linux/out
            sha256sum GenericAgent-Desktop-Linux.tar.gz > SHA256SUMS.txt
          )

          echo "Package contents:"
          tar -tzf artifacts/linux/out/GenericAgent-Desktop-Linux.tar.gz
          ls -lh artifacts/linux/out

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: GenericAgent-Desktop-Linux-Package-${{ github.run_number }}
          path: |
            artifacts/linux/out/GenericAgent-Desktop-Linux.tar.gz
            artifacts/linux/out/SHA256SUMS.txt
          if-no-files-found: error

      - name: Create or update Linux test pre-release
        if: ${{ inputs.upload_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="$INPUT_TAG"
          if [[ -z "$TAG_NAME" ]]; then
            TAG_NAME="desktop-linux-test-${{ github.run_number }}-${{ github.run_attempt }}"
          fi
          TITLE="GenericAgent Desktop Linux Test Build ${{ github.run_number }}"
          NOTES="Linux desktop test package. Download GenericAgent-Desktop-Linux.tar.gz, copy its files into GenericAgent/frontends/, then run install_linux.sh."

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" artifacts/linux/out/* --clobber
          else
            gh release create "$TAG_NAME" artifacts/linux/out/* \
              --target "${{ github.sha }}" \
              --title "$TITLE" \
              --notes "$NOTES" \
              --prerelease
          fi
